#:schema https://raw.githubusercontent.com/YunoHost/apps/main/schemas/manifest.v2.schema.json

packaging_format = 2

id = "paymenter"
name = "Paymenter"
description.en = "Webshop solution for hostings"
description.fr = "Webshop solution for hostings"

version = "1.4.7~ynh2"

maintainers = ["eric_G"]

[upstream]
license = "MIT"
website = "https://paymenter.org/"
demo = "https://demo.paymenter.org/"
admindoc = "https://paymenter.org/docs/installation/install"
code = "https://github.com/Paymenter/Paymenter"

[integration]
yunohost = ">= 12.1.39"
helpers_version = "2.1"
architectures = "all"
multi_instance = true

ldap = false
sso = false

disk = "50M"
ram.build = "50M"
ram.runtime = "50M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/paymenter"

    [install.init_main_permission]
    type = "group"
    default = "visitors"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["fr", "en"]
    default = "fr"
    
    [install.admin]
    type = "user"

    [install.password]
    help.en = "Use the help field to add an information for the admin about this question."
    help.fr = "Utilisez le champ aide pour ajouter une information à l'intention de l'administrateur à propos de cette question."
    type = "password"

[resources]

    [resources.sources]

    [resources.sources.main]
    in_subdir = false
    url = "https://github.com/Paymenter/Paymenter/releases/download/v1.4.7/paymenter.tar.gz"
    sha256 = "dd281fb32872ee291a8d6bfac41e41ad38fb3e0aada64160983bf491f452fe26"

    autoupdate.strategy = "latest_github_release"

    [resources.system_user]

    [resources.install_dir]

    [resources.data_dir]

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "mariadb-server, php8.4-gd, php8.4-mysql, php8.4-mbstring, php8.4-bcmath, php8.4-xml, php8.4-curl, php8.4-zip, php8.4-intl, php8.4-redis, redis-server"

    [resources.database]
    type = "mysql"
